const statusFilter = document.getElementById("statusFilter");
const statuses = [...new Set(DATA.map(x => x.status).filter(Boolean))].sort();
for (const s of statuses) {
  const opt = document.createElement("option");
  opt.value = s;
  opt.textContent = s;
  statusFilter.appendChild(opt);
}

function inDateRange(row) {
  const from = document.getElementById("fromDate").value;
  const to = document.getElementById("toDate").value;
  const rowDate = row.latest_email_date || row.applied_date || "";

  if (from && rowDate < from) return false;
  if (to && rowDate > to) return false;
  return true;
}

function applyFilters() {
  const q = document.getElementById("searchBox").value.toLowerCase();
  const status = document.getElementById("statusFilter").value;
  const follow = document.getElementById("followFilter").value;

  const filtered = DATA.filter(row => {
    const haystack = [
      row.company,
      row.job_title,
      row.latest_email_subject,
      row.recruiter_email
    ].join(" ").toLowerCase();

    if (q && !haystack.includes(q)) return false;
    if (status && row.status !== status) return false;
    if (follow && row.follow_up_needed !== follow) return false;
    if (!inDateRange(row)) return false;

    return true;
  });

  render(filtered);
}

function render(rows) {
  document.getElementById("totalCount").textContent = DATA.length;
  document.getElementById("filteredCount").textContent = rows.length;
  document.getElementById("replyCount").textContent = DATA.filter(x => x.recruiter_reach_back_date).length;
  document.getElementById("followCount").textContent = DATA.filter(x => x.follow_up_needed === "Yes").length;

  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  for (const row of rows) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${row.company || ""}</td>
      <td>${row.job_title || ""}</td>
      <td><span class="badge">${row.status || ""}</span></td>
      <td>${row.applied_date || ""}</td>
      <td>${row.recruiter_reach_back_date || ""}</td>
      <td>${row.recruiter_email || ""}</td>
      <td>${row.latest_email_date || ""}</td>
      <td>${row.latest_email_subject || ""}</td>
      <td><span class="badge ${row.follow_up_needed === "Yes" ? "follow" : ""}">${row.follow_up_needed || "No"}</span></td>
    `;
    tbody.appendChild(tr);
  }
}

["searchBox", "statusFilter", "fromDate", "toDate", "followFilter"].forEach(id => {
  document.getElementById(id).addEventListener("input", applyFilters);
});

render(DATA);
</script>
